<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WriteGeniusAI - AI写作助手</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      /* CSS Variables for consistent theming */
      :root {
        --primary-color: #165dff;
        --primary-hover: #0e42c2;
        --secondary-color: #6b93ff;
        --accent-color: #ff6b6b;
        --background-color: #f5f7fa;
        --card-background: #ffffff;
        --text-primary: #1d2129;
        --text-secondary: #4e5969;
        --text-light: #86909c;
        --border-color: #e5e6eb;
        --border-radius: 12px;
        --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.08);
        --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.12);
        --transition: all 0.3s ease;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI",
          Roboto, "Helvetica Neue", Arial, sans-serif;
        line-height: 1.6;
        color: var(--text-primary);
        background-color: var(--background-color);
        background-image: radial-gradient(
            circle at 10% 20%,
            rgba(107, 147, 255, 0.05) 0%,
            transparent 20%
          ),
          radial-gradient(
            circle at 90% 80%,
            rgba(22, 93, 255, 0.05) 0%,
            transparent 20%
          );
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }

      .container {
        max-width: 800px;
        width: 100%;
        background-color: var(--card-background);
        border-radius: var(--border-radius);
        box-shadow: var(--shadow-md);
        padding: 2.5rem;
        animation: fadeIn 0.5s ease-out;
      }

      h1 {
        text-align: center;
        color: var(--text-primary);
        margin-bottom: 2.5rem;
        font-size: 2.2rem;
        font-weight: 700;
        background: linear-gradient(
          135deg,
          var(--primary-color),
          var(--secondary-color)
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .form-group {
        margin-bottom: 1.8rem;
        animation: slideUp 0.5s ease-out;
      }

      label {
        display: block;
        margin-bottom: 0.7rem;
        font-weight: 600;
        color: var(--text-secondary);
        font-size: 0.95rem;
      }

      input[type="text"],
      select,
      textarea {
        width: 100%;
        padding: 1rem;
        border: 2px solid var(--border-color);
        border-radius: var(--border-radius);
        font-size: 1rem;
        transition: var(--transition);
        background-color: var(--card-background);
        font-family: inherit;
      }

      input[type="text"]:focus,
      select:focus,
      textarea:focus {
        outline: none;
        border-color: var(--primary-color);
        box-shadow: 0 0 0 3px rgba(22, 93, 255, 0.1);
      }

      textarea {
        resize: vertical;
        min-height: 120px;
      }

      .btn {
        display: inline-block;
        padding: 1rem 2rem;
        background-color: var(--primary-color);
        color: #fff;
        border: none;
        border-radius: var(--border-radius);
        font-size: 1.05rem;
        font-weight: 600;
        cursor: pointer;
        transition: var(--transition);
        position: relative;
        overflow: hidden;
        width: 100%;
        margin-top: 1rem;
      }

      .btn:hover {
        background-color: var(--primary-hover);
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(22, 93, 255, 0.3);
      }

      .btn:disabled {
        background-color: var(--border-color);
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
      }

      .result {
        margin-top: 2.5rem;
        padding: 2rem;
        background-color: var(--card-background);
        border-radius: var(--border-radius);
        border-left: 4px solid var(--primary-color);
        box-shadow: var(--shadow-sm);
        animation: fadeIn 0.5s ease-out;
      }

      .result h2 {
        color: var(--text-primary);
        margin-bottom: 1.2rem;
        font-size: 1.5rem;
        font-weight: 600;
      }

      .result-content {
        white-space: pre-wrap;
        line-height: 1.7;
        color: var(--text-secondary);
      }

      .loading {
        display: inline-block;
        width: 20px;
        height: 20px;
        border: 3px solid rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        border-top-color: #fff;
        animation: spin 1s ease-in-out infinite;
        margin-left: 10px;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .error {
        color: var(--accent-color);
        margin-top: 1.2rem;
        padding: 1rem;
        background-color: rgba(255, 107, 107, 0.05);
        border-radius: var(--border-radius);
        border-left: 4px solid var(--accent-color);
        animation: fadeIn 0.5s ease-out;
      }

      .style-info {
        font-size: 0.9rem;
        color: var(--text-light);
        margin-top: 0.5rem;
        padding: 0.5rem;
        background-color: rgba(22, 93, 255, 0.05);
        border-radius: 6px;
      }

      /* Animations */
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Responsive design */
      @media (max-width: 768px) {
        body {
          padding: 1rem;
        }

        .container {
          padding: 1.5rem;
        }

        h1 {
          font-size: 1.8rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>WriteGeniusAI - AI写作助手</h1>

      <form id="generate-form">
        <div class="form-group">
          <label for="topic">文章主题</label>
          <input
            type="text"
            id="topic"
            name="topic"
            required
            placeholder="请输入文章主题"
          />
        </div>

        <div class="form-group">
          <label for="style">写作风格</label>
          <select id="style" name="style" required>
            <option value="academic">学术风格</option>
            <option value="business">商务风格</option>
            <option value="creative" selected>创意风格</option>
            <option value="technical">技术风格</option>
            <option value="story">故事风格</option>
          </select>
          <div class="style-info" id="style-info">
            富有想象力、生动形象的创意写作风格
          </div>
        </div>

        <div class="form-group">
          <label for="length">文章长度</label>
          <select id="length" name="length" required>
            <option value="short">短篇 (约200字)</option>
            <option value="medium" selected>中篇 (约500字)</option>
            <option value="long">长篇 (约1000字)</option>
          </select>
        </div>

        <div class="form-group">
          <label for="title">文章标题 (可选)</label>
          <input
            type="text"
            id="title"
            name="title"
            placeholder="如果不填写，系统会自动生成"
          />
        </div>

        <button type="submit" class="btn" id="generate-btn">
          <span id="btn-text">生成文章</span>
          <span class="loading" id="loading" style="display: none"></span>
        </button>
      </form>

      <div class="result" id="result" style="display: none">
        <h2 id="result-title"></h2>
        <div class="result-content" id="result-content"></div>
      </div>

      <div class="error" id="error" style="display: none"></div>
    </div>

    <script>
      // 硬编码风格信息
      const styles = {
        academic: {
          name: "学术风格",
          description: "正式、严谨、逻辑清晰的学术写作风格",
        },
        business: {
          name: "商务风格",
          description: "专业、简洁、目标明确的商务写作风格",
        },
        creative: {
          name: "创意风格",
          description: "富有想象力、生动形象的创意写作风格",
        },
        technical: {
          name: "技术风格",
          description: "准确、详细、专业的技术写作风格",
        },
        story: {
          name: "故事风格",
          description: "生动、感人、有情节的故事写作风格",
        },
      };

      // 风格选择事件
      document.getElementById("style").addEventListener("change", function () {
        const styleKey = this.value;
        document.getElementById("style-info").textContent =
          styles[styleKey].description;
      });

      // 表单提交事件
      document
        .getElementById("generate-form")
        .addEventListener("submit", function (e) {
          e.preventDefault();

          // 显示加载状态
          document.getElementById("btn-text").textContent = "生成中...";
          document.getElementById("loading").style.display = "inline-block";
          document.getElementById("generate-btn").disabled = true;
          document.getElementById("result").style.display = "none";
          document.getElementById("error").style.display = "none";

          // 获取表单数据
          const formData = {
            topic: document.getElementById("topic").value,
            style: document.getElementById("style").value,
            length: document.getElementById("length").value,
            title: document.getElementById("title").value || null,
          };

          // 发送请求
          fetch("/stream", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify(formData),
          })
            .then((response) => {
              if (!response.ok) {
                throw new Error("网络请求失败");
              }
              return response.body;
            })
            .then((body) => {
              const reader = body.getReader();
              let result = "";

              function read() {
                return reader.read().then(({ done, value }) => {
                  if (done) {
                    // 处理完整响应
                    try {
                      const data = JSON.parse(result);
                      if (data.error) {
                        throw new Error(data.error);
                      }
                      document.getElementById("result-title").textContent =
                        data.title;
                      document.getElementById("result-content").textContent =
                        data.content;
                      document.getElementById("result").style.display = "block";
                    } catch (e) {
                      document.getElementById("error").textContent =
                        "生成失败: " + e.message;
                      document.getElementById("error").style.display = "block";
                    }

                    // 恢复按钮状态
                    document.getElementById("btn-text").textContent =
                      "生成文章";
                    document.getElementById("loading").style.display = "none";
                    document.getElementById("generate-btn").disabled = false;
                    return;
                  }

                  // 处理流式数据
                  result += new TextDecoder("utf-8").decode(value);
                  return read();
                });
              }

              return read();
            })
            .catch((error) => {
              document.getElementById("error").textContent =
                "生成失败: " + error.message;
              document.getElementById("error").style.display = "block";

              // 恢复按钮状态
              document.getElementById("btn-text").textContent = "生成文章";
              document.getElementById("loading").style.display = "none";
              document.getElementById("generate-btn").disabled = false;
            });
        });
    </script>
  </body>
</html>
